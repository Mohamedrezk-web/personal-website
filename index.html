  <body id="page-top">
    <!-- Skip link — first focusable element, visually hidden until keyboard focus -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Color-blind SVG filter bank — applied via body.style.filter from JS -->
    <svg aria-hidden="true" focusable="false"
         style="position:absolute;width:0;height:0;overflow:hidden">
      <defs>
        <!-- Protanopia (red-blind) — HCIRN standard matrix -->
        <filter id="cb-protanopia">
          <feColorMatrix type="matrix" values="
            0.567 0.433 0     0 0
            0.558 0.442 0     0 0
            0     0.242 0.758 0 0
            0     0     0     1 0"/>
        </filter>
        <!-- Deuteranopia (green-blind) -->
        <filter id="cb-deuteranopia">
          <feColorMatrix type="matrix" values="
            0.625 0.375 0     0 0
            0.700 0.300 0     0 0
            0     0.300 0.700 0 0
            0     0     0     1 0"/>
        </filter>
        <!-- Tritanopia (blue-blind) -->
        <filter id="cb-tritanopia">
          <feColorMatrix type="matrix" values="
            0.950 0.050 0     0 0
            0     0.433 0.567 0 0
            0     0.475 0.525 0 0
            0     0     0     1 0"/>
        </filter>
      </defs>
    </svg>

    <!-- Full-page background canvas (default theme — hidden in cyber/minimal/light via CSS) -->
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <!-- LOADER -->

      </div>
    </div>

    <!-- Help dialogs — referenced by NavbarComponent via getElementById -->
    <dialog id="keyboard-help-dialog" aria-labelledby="kh-title">
      <div class="ds-dialog-inner">
        <h2 id="kh-title">Keyboard Navigation</h2>
        <div class="ds-dialog-body"></div>
        <button class="ds-dialog-close" type="button" aria-label="Close keyboard help">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
    </dialog>
    <dialog id="sr-help-dialog" aria-labelledby="sr-title">
      <div class="ds-dialog-inner">
        <h2 id="sr-title">Screen Reader Guide</h2>
        <div class="ds-dialog-body"></div>
        <button class="ds-dialog-close" type="button" aria-label="Close screen reader help">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </div>
    </dialog>

    <!-- ARIA live region — announces a11y state changes to screen readers.
         Must live outside <main> so the router's content-clear loop doesn't remove it. -->
    <div id="a11y-announcer" aria-live="polite" aria-atomic="true" class="ds-sr-only"></div>
